version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════
  # PostgreSQL Database (Local Development)
  # ═══════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: nexthome_postgres_local
    restart: unless-stopped
    
    environment:
      POSTGRES_DB: nexthome_db
      POSTGRES_USER: nexthome_dev
      POSTGRES_PASSWORD: nexthome_dev_password
      POSTGRES_INITDB_ARGS: "-c log_statement=all -c log_duration=on"
    
    ports:
      - "5432:5432"
    
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
      - ./migrations.sql:/docker-entrypoint-initdb.d/migrations.sql
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexthome_dev -d nexthome_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    networks:
      - nexthome_local

  # ═══════════════════════════════════════════════════════════
  # n8n Workflow Automation
  # ═══════════════════════════════════════════════════════════
  n8n:
    image: n8nio/n8n:latest
    container_name: nexthome_n8n_local
    restart: unless-stopped
    
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_db
      - DB_POSTGRESDB_USER=nexthome_dev
      - DB_POSTGRESDB_PASSWORD=nexthome_dev_password
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=development
      - WEBHOOK_TUNNEL_URL=http://localhost:5678
      - N8N_LOG_LEVEL=debug
    
    ports:
      - "5678:5678"
    
    volumes:
      - n8n_data_local:/home/node/.n8n
    
    depends_on:
      postgres:
        condition: service_healthy
    
    networks:
      - nexthome_local
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════════════
  # Flowise - AI Orchestration
  # ═══════════════════════════════════════════════════════════
  flowise:
    image: flowiseai/flowise:latest
    container_name: nexthome_flowise_local
    restart: unless-stopped
    
    environment:
      - PORT=3000
      - DATABASE_PATH=/root/.flowise
      - APIKEY_PATH=/root/.flowise
      - LOG_PATH=/root/.flowise/logs
      - NODE_ENV=development
    
    ports:
      - "3001:3000"
    
    volumes:
      - flowise_data_local:/root/.flowise
    
    depends_on:
      - postgres
    
    networks:
      - nexthome_local
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════════════
  # Qdrant Vector Database
  # ═══════════════════════════════════════════════════════════
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nexthome_qdrant_local
    restart: unless-stopped
    
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    
    volumes:
      - qdrant_data_local:/qdrant/storage
    
    networks:
      - nexthome_local
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data_local:
    driver: local
  n8n_data_local:
    driver: local
  flowise_data_local:
    driver: local
  qdrant_data_local:
    driver: local

networks:
  nexthome_local:
    driver: bridge
